  <!-- Theme initialization script - runs before body to prevent flash -->
  <script>
    (function () {
      // Check for saved theme preference or system preference
      const savedTheme = localStorage.getItem("theme");
      const systemPrefersDark = window.matchMedia(
        "(prefers-color-scheme: dark)",
      ).matches;

      // Apply theme to root element
      if (
        savedTheme === "dark" ||
        (savedTheme === null && systemPrefersDark)
      ) {
        document.documentElement.setAttribute("data-theme", "dark");
      } else if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
      }
      // If no saved theme and system is light, don't set attribute (default light)

      // Remove no-transitions class after page load to enable smooth transitions
      window.addEventListener("load", function () {
        setTimeout(function () {
          document.documentElement.classList.remove("no-transitions");
        }, 100);
      });
    })();
  </script>
