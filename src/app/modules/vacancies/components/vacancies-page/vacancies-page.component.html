<app-page-header>Вакансии</app-page-header>

<div class="container my-5" *ngIf="vacancies; else dataLoading">
  <div class="card">
    <div class="card-body mobile-px-5 mobile-py-5">
      <div class="mb-3">
        <div class="row">
          <div class="col-md-8 mb-1">
            <label for="searchQuery" class="visually-hidden">Поиск вакансии</label>
            <input
              type="text"
              placeholder="Поиск по названию и описанию. Минимум {{
                MIN_SEARCH_QUERY_LENGTH
              }} символа"
              class="form-control"
              id="searchQuery"
              aria-label="Поиск вакансии"
              [(ngModel)]="searchQuery"
              (keyup)="onKeyupEvent($event)"
            />
          </div>
          <div class="col-md-4 mb-1">
            <button
              type="button"
              class="btn btn-outline-primary"
              [disabled]="!searchButtonShouldBeEnabled"
              [class.disabled]="!searchButtonShouldBeEnabled"
              (click)="search()"
            >
              Найти
            </button>
            <button
              type="button"
              class="btn btn-outline-dark ms-2"
              (click)="clearSearch()"
            >
              Сбросить
            </button>
          </div>
        </div>
      </div>

      <div *ngIf="vacancies.length > 0; else nothingToShow" class="vacancy-list">
        <a
          *ngFor="let item of vacancies"
          class="mb-3 d-block text-decoration-none vacancy-list-item"
          [routerLink]="['/vacancies', item.id]"
        >
          <div class="d-flex justify-content-between align-items-start">
            <div class="h5 mb-1">{{ item.title }}</div>
            <span class="badge {{ statusEnum.badgeCss(item.status) }} ms-2">{{
              statusEnum.label(item.status)
            }}</span>
          </div>
          <div class="small text-muted">
            <span class="me-2">Компания:</span>
            <span class="text-dark">{{ item.companyName }}</span>
          </div>
          <div class="small text-muted mt-1">
            Опубликовано: {{ item.createdAt | date: "yyyy-MM-dd" }}
          </div>
        </a>
      </div>

      <div class="mt-5" *ngIf="source && source.results.length > 0">
        <app-pagination-buttons
          [source]="source"
          [currentPage]="currentPage"
          (pageChange)="loadData($event)"
        ></app-pagination-buttons>
      </div>
    </div>
  </div>
</div>

<ng-template #dataLoading>
  <div class="container mt-5">
    <app-data-loader [title]="''">
      <div class="mt-3 pb-5">
        <div class="text-muted h2 d-flex justify-content-center">
          Загружаем список вакансий
        </div>
      </div>
    </app-data-loader>
  </div>
</ng-template>

<ng-template #nothingToShow>
  <div class="text-center text-muted">Пока не опубликовано ни одной вакансии.</div>
</ng-template>
